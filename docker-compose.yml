version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rigirigianime_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/rigirigianime
      - JWT_SECRET=supersecretproductionkeychangeit
      - ENV=production
      - LOG_LEVEL=info
    restart: always
